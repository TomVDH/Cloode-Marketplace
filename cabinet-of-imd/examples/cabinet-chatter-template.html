<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cabinet Chatter — Cabinet of IMD</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Dark mode (default) */
      --bg: #0c1018;
      --bg-app: #111820;
      --bg-header: #151c26;
      --bg-hover: rgba(100, 140, 180, 0.04);
      --border: #1c2430;
      --text: #94a0b4;
      --text-msg: #7888a0;
      --text-muted: #384858;

      /* Member name colours (dark mode) */
      --name-thieuke: #88b0b8;
      --name-sakke: #d88070;
      --name-jonasty: #90a898;
      --name-pitr: #707888;
      --name-kevijntje: #d0a840;
      --name-poekie: #7898a8;
      --name-bostrol: #a0a090;
      --name-henske: #a888c0;

      /* Avatar colours (same as name colours) */
      --av-thieuke: #88b0b8;
      --av-sakke: #d88070;
      --av-jonasty: #90a898;
      --av-pitr: #707888;
      --av-kevijntje: #d0a840;
      --av-poekie: #7898a8;
      --av-bostrol: #a0a090;
      --av-henske: #a888c0;

      /* Marker colours (dark mode) */
      --marker-version: #5888a0;
      --marker-mood: #a09050;
      --marker-scope: #a06068;
      --marker-gate: #608870;

      color-scheme: dark;
    }

    body.light {
      --bg: #eceae4;
      --bg-app: #f4f2ee;
      --bg-header: #e6e4de;
      --bg-hover: rgba(0, 0, 0, 0.03);
      --border: #d0cec8;
      --text: #4a4840;
      --text-msg: #5a5850;
      --text-muted: #a0a098;

      /* Member name colours (light mode) */
      --name-thieuke: #4a7078;
      --name-sakke: #a05040;
      --name-jonasty: #506858;
      --name-pitr: #484e58;
      --name-kevijntje: #8a7020;
      --name-poekie: #486070;
      --name-bostrol: #686058;
      --name-henske: #6a4888;

      /* Avatar colours (same as name colours) */
      --av-thieuke: #4a7078;
      --av-sakke: #a05040;
      --av-jonasty: #506858;
      --av-pitr: #484e58;
      --av-kevijntje: #8a7020;
      --av-poekie: #486070;
      --av-bostrol: #686058;
      --av-henske: #6a4888;

      /* Marker colours (light mode) */
      --marker-version: #38687a;
      --marker-mood: #706830;
      --marker-scope: #784048;
      --marker-gate: #406048;

      color-scheme: light;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      transition: background-color 0.2s, color 0.2s;
    }

    .app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      max-width: 700px;
      margin: 0 auto;
      background-color: var(--bg-app);
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      background-color: var(--bg-header);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .channel-icon {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      flex-shrink: 0;
    }

    .channel-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .channel-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-left: auto;
      flex-shrink: 0;
    }

    .theme-toggle {
      width: 36px;
      height: 36px;
      border: 1px solid var(--border);
      background-color: var(--bg-app);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background-color 0.2s, border-color 0.2s;
    }

    .theme-toggle:hover {
      background-color: var(--bg-hover);
    }

    .theme-toggle::before {
      content: '☀️';
    }

    body.light .theme-toggle::before {
      content: '🌙';
    }

    .sidebar-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 12px 20px 8px;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Scrollbar styling */
    .messages::-webkit-scrollbar {
      width: 8px;
    }

    .messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages::-webkit-scrollbar-thumb {
      background-color: var(--border);
      border-radius: 4px;
    }

    .messages::-webkit-scrollbar-thumb:hover {
      background-color: var(--text-muted);
    }

    .divider {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 16px 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin: 8px 0;
    }

    .msg {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--bg-app);
    }

    .av-thieuke {
      background-color: var(--av-thieuke);
    }

    .av-sakke {
      background-color: var(--av-sakke);
    }

    .av-jonasty {
      background-color: var(--av-jonasty);
    }

    .av-pitr {
      background-color: var(--av-pitr);
    }

    .av-kevijntje {
      background-color: var(--av-kevijntje);
    }

    .av-poekie {
      background-color: var(--av-poekie);
    }

    .av-bostrol {
      background-color: var(--av-bostrol);
    }

    .av-henske {
      background-color: var(--av-henske);
    }

    .msg-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-header {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .msg-name {
      font-weight: 700;
      font-size: 13px;
    }

    .msg-name-thieuke {
      color: var(--name-thieuke);
    }

    .msg-name-sakke {
      color: var(--name-sakke);
    }

    .msg-name-jonasty {
      color: var(--name-jonasty);
    }

    .msg-name-pitr {
      color: var(--name-pitr);
    }

    .msg-name-kevijntje {
      color: var(--name-kevijntje);
    }

    .msg-name-poekie {
      color: var(--name-poekie);
    }

    .msg-name-bostrol {
      color: var(--name-bostrol);
    }

    .msg-name-henske {
      color: var(--name-henske);
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .msg-text {
      color: var(--text-msg);
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .msg-markers {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .marker {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .marker-version {
      background-color: rgba(88, 136, 160, 0.15);
      color: var(--marker-version);
    }

    body.light .marker-version {
      background-color: rgba(56, 104, 122, 0.1);
    }

    .marker-mood {
      background-color: rgba(160, 144, 80, 0.15);
      color: var(--marker-mood);
    }

    body.light .marker-mood {
      background-color: rgba(112, 104, 48, 0.1);
    }

    .marker-scope {
      background-color: rgba(160, 96, 104, 0.15);
      color: var(--marker-scope);
    }

    body.light .marker-scope {
      background-color: rgba(120, 64, 72, 0.1);
    }

    .marker-gate {
      background-color: rgba(96, 136, 112, 0.15);
      color: var(--marker-gate);
    }

    body.light .marker-gate {
      background-color: rgba(64, 96, 72, 0.1);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <span class="channel-icon">#</span>
      <span class="channel-name">cabinet-chatter</span>
      <span class="channel-desc">The Cabinet of IMD — internal comms</span>
      <button class="theme-toggle" onclick="document.body.classList.toggle('light')" aria-label="Toggle theme"></button>
    </div>
    <div class="sidebar-label">Messages</div>
    <div class="messages">
      <div class="divider">Project started</div>
</div><!-- END MESSAGES -->
  </div>
</body>
</html>
